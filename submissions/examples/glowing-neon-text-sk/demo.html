<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glowing Neon Text Effect - EaseMotion CSS</title>
  <!-- Link to EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-dark ease-text-light ease-min-h-screen ease-flex ease-items-center ease-justify-center" style="background-color: #111; color: #fff;">

  <div class="ease-text-center ease-p-8">
    <h1 class="ease-text-6xl ease-font-bold ease-mb-4 neon-text neon-cyan">
      Neon Hero Title
    </h1>
    <h2 class="ease-text-4xl ease-font-semibold ease-mb-8 neon-text neon-magenta">
      Creative Portfolios
    </h2>
    <div class="ease-flex ease-justify-center ease-gap-4">
      <button class="ease-btn ease-px-6 ease-py-3 ease-rounded-md ease-font-bold neon-btn">Get Started</button>
      <button class="ease-btn ease-px-6 ease-py-3 ease-rounded-md ease-font-bold neon-btn neon-btn-magenta">Documentation</button>
    </div>
  </div>

</body>
</html>
